<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>

<body>
    <form action="/formulario" method="POST" border="1" style="width: 100%;">
        <h2>Cadastro</h2>
        <form>
            <div>
                <label for="nome">Nome: </label>
                <input type="text" name="nome" placeholder="Digite seu nome">
            </div>
            <div>
                <label for="email">Email: </label>
                <input type="email" name="email" placeholder="Digite seu email">
            </div>
            <div>
                <label for="senha">Senha: </label>
                <input type="senha" name="senha" placeholder="Digite sua senha">
            </div>
            <div>
                <label for="telefone">Telefone: </label>
                <input type="tel" name="telefone" placeholder="Digite seu telefone">
            </div>
            <div>
                <label for="data">Data de nascimento: </label>
                <input type="date" name="data">
            </div>
            <div>
                <label for="cor">Cor favorita: </label>
                <input type="color" name="cor">
            </div>
            <div>
                <label for="cadastro">Data e hora de cadastro:</label>
                <input type="datetime-local" id="cadastro" name="data_cadastro">
            </div>
            <div>
                <label for="horario">Horário preferido:</label>
                <input type="time" id="horario" name="horario_preferido">
            </div>
            <div>
                <label for="mes">Mês de referência:</label>
                <input type="month" id="mes" name="mes_referencia">
            </div>
            <div>
                <label for="semana">Semana do ano:</label>
                <input type="week" id="semana" name="semana_ano">
            </div>
            <div>
                <label for="idade">Idade:</label>
                <input type="number" id="idade" name="idade_usuario" min="0" max="120">
            </div>
            <div>
                <label for="satisfacao">Nível de satisfação (0 a 10):</label>
                <input type="range" id="satisfacao" name="nivel_satisfacao" min="0" max="10">
            </div>
            <div>
                <label for="foto">Escolha sua foto de perfil:</label>
                <input type="file" id="foto" name="foto_perfil" accept="image/*">
            </div>
            <div>
                <p>Selecione seu gênero:</p>

                <input type="radio" id="fem" name="genero" value="feminino">
                <label for="fem">Feminino</label>

                <input type="radio" id="masc" name="genero" value="masculino">
                <label for="masc">Masculino</label>

                <input type="radio" id="outro" name="genero" value="outro">
                <label for="outro">Outro</label>
            </div>
            <div>
                <p>Quais tecnologias você tem interesse?</p>

                <input type="checkbox" id="html" name="interesses" value="HTML">
                <label for="html">HTML</label><br>

                <input type="checkbox" id="css" name="interesses" value="CSS">
                <label for="css">CSS</label><br>

                <input type="checkbox" id="js" name="interesses" value="JavaScript">
                <label for="js">JavaScript</label>
            </div>


            
            <div>
                <button type="submit">Enviar Cadastro</button>

                <button type="reset">Limpar Formulário</button>
            </div>
            <div>
                <form action="/salvar_perfil" method="POST" enctype="multipart/form-data">


            </div>
            
        </form>
</body>

</html>
